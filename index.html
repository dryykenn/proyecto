<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#100b2d">
  <title>Ereein · Para ti</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="enhancements.css">
  <link rel="stylesheet" href="twilight.css">
</head>
<body>
  <div class="sky"></div><div class="stars" aria-hidden="true"></div>
  <main class="scene" aria-label="Un jardín nocturno de girasoles">
    <div class="moon"></div>
    <div class="city" aria-hidden="true"></div>
    <div class="web web-left" aria-hidden="true"></div><div class="web web-right" aria-hidden="true"></div>
    <header><p>una pequeña sorpresa para</p><h1>Ereein</h1><span>✦</span></header>

    <section class="garden" aria-hidden="true">
      <div class="sunflowers back"></div><div class="sunflowers front"></div>
    </section>

    <section class="couple" aria-label="Una flor para Ereein">
      <div class="thread"></div>
      <div class="kendry">
        <div class="mask"><i></i><b></b></div><div class="torso"><em>✦</em></div>
        <div class="arm arm-left"></div><div class="arm arm-right"></div>
        <div class="leg leg-left"></div><div class="leg leg-right"></div>
      </div>
      <div class="gift-flower" aria-hidden="true"><div class="flower-head"></div><div class="flower-stem"></div><div class="leaf leaf-a"></div><div class="leaf leaf-b"></div></div>
      <div class="her">
        <div class="hair"></div><div class="face"><i></i><b></b><span></span></div>
        <div class="dress"><i class="twilight-charm">✦</i></div><div class="her-arm arm-one"></div><div class="her-arm arm-two"></div>
        <div class="skirt"></div>
      </div>
      <div class="twilight-magic" aria-hidden="true"><i class="spell-book">✦</i><b class="magic-spark s1">✦</b><b class="magic-spark s2">✧</b><b class="magic-spark s3">✦</b><span class="magic-ring r1"></span><span class="magic-ring r2"></span></div>
      <div class="speech">Para Ereein <span>♥</span></div>
    </section>
    <p class="note">Cada día contigo florece un poco más.</p>
    <button class="replay" type="button" aria-label="Repetir animación">↻ <span>repetir momento</span></button>
    <button class="sound" type="button" aria-label="Activar o desactivar sonido">♫ <span>sonido</span></button>
    <audio id="music" loop preload="auto"><source src="audio.mpeg" type="audio/mpeg"></audio>
  </main>
  <div class="petals" aria-hidden="true"></div>
  <div class="intro" role="dialog" aria-label="Abrir la sorpresa"><button type="button"><small>toca para entrar</small><strong>Para ti, Ereein</strong><span>✦</span></button></div>
  <script src="script.js"></script>
</body>
</html>
